syntax = "proto3";

package raft;

service RaftService {
  rpc RequestVote(VoteRequest) returns (VoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

service KvService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Metrics(MetricsRequest) returns (MetricsResponse);
}

message VoteRequest {
  uint64 term = 1;
  int32 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message VoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  string command = 3;
}

message AppendEntriesRequest {
  uint64 term = 1;
  int32 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;

  // Follower's current last log index. Leader uses this hint to jump next_index
  // back quickly when the follower is far behind instead of decreasing one by one.
  uint64 last_log_index = 4;

  // Fast log backtracking hint. When success=false:
  //   conflict_term == 0 means the follower is missing prev_log_index, and
  //   conflict_index is the first index the leader should try next.
  //   conflict_term != 0 means the follower has a different term at prev_log_index,
  //   and conflict_index is the first index for that conflicting term.
  uint64 conflict_index = 5;
  uint64 conflict_term = 6;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  int32 leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes snapshot_data = 5;
}

message InstallSnapshotResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 last_log_index = 3;
  string message = 4;
}

enum KvStatusCode {
  KV_STATUS_CODE_UNSPECIFIED = 0;
  KV_STATUS_CODE_OK = 1;
  KV_STATUS_CODE_NOT_LEADER = 2;
  KV_STATUS_CODE_INVALID_ARGUMENT = 3;
  KV_STATUS_CODE_KEY_NOT_FOUND = 4;
  KV_STATUS_CODE_INTERNAL_ERROR = 5;
  KV_STATUS_CODE_NODE_STOPPING = 6;
  KV_STATUS_CODE_TIMEOUT = 7;
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message PutResponse {
  KvStatusCode code = 1;
  string message = 2;
  int32 leader_id = 3;
  string leader_address = 4;
  uint64 term = 5;
  uint64 log_index = 6;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  KvStatusCode code = 1;
  string message = 2;
  int32 leader_id = 3;
  string leader_address = 4;
  uint64 term = 5;
  uint64 log_index = 6;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  KvStatusCode code = 1;
  string message = 2;
  int32 leader_id = 3;
  string leader_address = 4;
  uint64 term = 5;
  bool found = 6;
  string value = 7;
}

message StatusRequest {}

message PeerReplicationProgress {
  int32 peer_id = 1;
  string address = 2;
  uint64 match_index = 3;
  uint64 next_index = 4;
}

message RpcMetric {
  string name = 1;
  uint64 success_count = 2;
  uint64 failure_count = 3;
  uint64 total_latency_us = 4;
  uint64 max_latency_us = 5;
}

message MetricsSnapshot {
  uint64 propose_success_count = 1;
  uint64 propose_failure_count = 2;
  uint64 election_count = 3;
  uint64 leader_change_count = 4;
  uint64 snapshot_success_count = 5;
  uint64 snapshot_failure_count = 6;
  uint64 storage_persist_failure_count = 7;
  repeated RpcMetric rpc_metrics = 8;
}

message StatusResponse {
  int32 node_id = 1;
  string address = 2;
  string role = 3;
  uint64 term = 4;
  int32 leader_id = 5;
  string leader_address = 6;
  uint64 commit_index = 7;
  uint64 last_applied = 8;
  uint64 last_log_index = 9;
  uint64 snapshot_index = 10;
  repeated PeerReplicationProgress peers = 11;
  MetricsSnapshot metrics = 12;
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string message = 2;
  int32 node_id = 3;
  string role = 4;
  uint64 term = 5;
  int32 leader_id = 6;
}

message MetricsRequest {}

message MetricsResponse {
  int32 node_id = 1;
  string role = 2;
  uint64 term = 3;
  int32 leader_id = 4;
  string leader_address = 5;
  MetricsSnapshot metrics = 6;
}
